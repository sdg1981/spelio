<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#d90000" />
    <title>Spelio</title>
    <style>
      :root {
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #071522;
        background: #f6f5f2;
        font-synthesis: none;
        text-rendering: optimizeLegibility;
        -webkit-font-smoothing: antialiased;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
        margin: 0;
      }

      body {
        min-height: 100svh;
        display: grid;
        place-items: center;
        background: #f6f5f2;
      }

      main {
        width: min(100%, 430px);
        min-height: 100svh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 56px 32px 40px;
        text-align: center;
      }

      .logo {
        color: #071522;
        font-size: clamp(42px, 12vw, 54px);
        font-weight: 900;
        letter-spacing: -0.078em;
        line-height: 0.86;
      }

      .logo span {
        color: #d90000;
        letter-spacing: -0.04em;
      }

      h1 {
        margin: 42px 0 0;
        color: #071522;
        font-size: clamp(24px, 6vw, 34px);
        font-weight: 950;
        letter-spacing: -0.04em;
        line-height: 1.08;
        text-wrap: balance;
      }

      p {
        margin: 14px 0 0;
        color: #687481;
        font-size: 17px;
        font-weight: 650;
        line-height: 1.45;
        text-wrap: balance;
      }

      button {
        margin-top: 38px;
        min-width: 132px;
        border: 0;
        border-radius: 9px;
        background: #d90000;
        color: #fff;
        padding: 16px 38px;
        font: inherit;
        font-size: 18px;
        font-weight: 700;
        box-shadow: 0 18px 40px rgba(217, 0, 0, 0.18);
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="logo" aria-label="Spelio">Spelio<span>.</span></div>
      <h1>Spelio needs an internet connection to load.</h1>
      <p>Please reconnect and try again.</p>
      <button type="button" onclick="window.location.reload()">Retry</button>
    </main>
  </body>
</html>
